name: Deploy Quademar

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest

    steps:
      - name: install ssh keys
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -e

            echo "=== WHOAMI ==="
            whoami

            echo "=== PROJECT DIR ==="
            cd /root/var/www/Quademar
            pwd
            ls -la
            git status

            echo "=== PULL ==="
            git pull origin main

            echo "=== NODE/NPM ==="
            node -v
            npm -v

            echo "=== BUILD ==="
            cd site
            npm ci
            npm run build

            echo "=== DONE ==="
          '

      - name: cleanup
        run: rm -rf ~/.ssh
