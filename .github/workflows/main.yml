name: Deploy Quademar

# Two builds on every push to main:
# 1) CI: `cd site && npm run build` — same as local, fails deploy if broken.
# 2) Server after `git pull`: Docker image runs `npm run build` again (Dockerfile) → nginx serves dist.

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# Run official Actions on Node 24 (see GitHub Actions Node 20 deprecation).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_site:
    name: "site/: npm ci && npm run build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: npm run build (must match site/package.json "build")
        run: |
          set -euo pipefail
          cd site
          npm ci
          npm run build

  deploy:
    name: Deploy to server
    needs: build_site
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: "On server: git pull → Docker (npm run build in image) → up"
        env:
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          TARGET="${SSH_DEPLOY_PATH:-/root/var/www/Quademar}"

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            bash -s -- "$TARGET" << 'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$1"
          echo "=== Deploy path ==="
          pwd

          echo "=== 1) Git sync (pull latest main) ==="
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          export CACHEBUST="$(git rev-parse HEAD)"
          echo "=== 2) Image build for commit ==="
          echo "$CACHEBUST"

          echo "=== Compose CLI ==="
          if docker compose version >/dev/null 2>&1; then
            DC=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            DC=(docker-compose)
          else
            echo "ERROR: Install Docker Compose v2 (docker compose) or v1 (docker-compose)." >&2
            exit 1
          fi
          "${DC[@]}" version

          echo "=== 3) Docker build (Dockerfile RUN npm run build = site/package.json build) ==="
          DOCKER_BUILDKIT=1 "${DC[@]}" --progress=plain build --pull

          echo "=== 4) Containers up ==="
          "${DC[@]}" up -d --remove-orphans

          echo "=== Done ==="
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        run: rm -rf ~/.ssh
