name: Deploy Quademar

# Порядок на сервері: спочатку git pull у SSH_DEPLOY_PATH, потім docker compose build
# (Vite збірка всередині образа) і up. Push на main лише запускає цей сценарій.
#
# Server order: git pull in deploy dir → Docker image build (includes npm run build) → compose up.

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: "On server: git pull → Docker build → up"
        env:
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          TARGET="${SSH_DEPLOY_PATH:-/root/var/www/Quademar}"

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            bash -s -- "$TARGET" << 'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$1"
          echo "=== Deploy path ==="
          pwd

          echo "=== 1) Git sync (pull latest main) ==="
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          export CACHEBUST="$(git rev-parse HEAD)"
          echo "=== 2) Image build for commit ==="
          echo "$CACHEBUST"

          echo "=== Compose CLI ==="
          if docker compose version >/dev/null 2>&1; then
            DC=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            DC=(docker-compose)
          else
            echo "ERROR: Install Docker Compose v2 (docker compose) or v1 (docker-compose)." >&2
            exit 1
          fi
          "${DC[@]}" version

          echo "=== 3) Docker build (runs npm run build in Dockerfile) ==="
          DOCKER_BUILDKIT=1 "${DC[@]}" --progress=plain build --pull

          echo "=== 4) Containers up ==="
          "${DC[@]}" up -d --remove-orphans

          echo "=== Done ==="
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        run: rm -rf ~/.ssh
