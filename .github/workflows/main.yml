name: Deploy Quademar

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest

    steps:
      - name: install ssh keys
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -x

            echo "=== USER ==="
            whoami
            id

            echo "=== HOME ==="
            echo "$HOME"

            echo "=== CURRENT DIR ==="
            pwd

            echo "=== ROOT LS ==="
            ls -la /
            echo "=== /var ==="
            ls -la /var || true
            echo "=== /var/www ==="
            ls -la /var/www || true
            echo "=== /var/www/Quademar ==="
            ls -la /var/www/Quademar || true
            echo "=== /var/www/Quademar/.git ==="
            ls -la /var/www/Quademar/.git || true

            echo "=== TRY CD ==="
            cd /var/www/Quademar || exit 1
            pwd

            echo "=== GIT CHECK ==="
            git rev-parse --show-toplevel || true
            git status || true
            git branch || true
            git remote -v || true

            echo "=== NODE CHECK ==="
            which node || true
            which npm || true
            node -v || true
            npm -v || true

            echo "=== PATH ==="
            echo "$PATH"

            echo "=== SITE DIR ==="
            ls -la /var/www/Quademar/site || true

            echo "=== PULL ==="
            git pull origin main || exit 1

            echo "=== BUILD ==="
            cd /var/www/Quademar/site || exit 1
            npm ci || exit 1
            npm run build || exit 1
          '

      - name: cleanup
        run: rm -rf ~/.ssh
