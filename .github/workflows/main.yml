name: Deploy Quademar

on:
  push:
    branches:
      - main

# One deploy at a time; new pushes wait instead of stacking broken partial deploys.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull and build on server
        env:
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          TARGET="${SSH_DEPLOY_PATH:-/root/var/www/Quademar}"
          REMOTE_CD="$(printf '%q' "$TARGET")"

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -euo pipefail; cd ${REMOTE_CD}; echo '=== Deploy path ==='; pwd; echo '=== Git sync ==='; git fetch origin main; git checkout main; git pull --ff-only origin main; echo '=== Docker ==='; docker compose version; docker compose up -d --build --remove-orphans; echo '=== Done ==='"

      - name: Remove SSH key
        if: always()
        run: rm -rf ~/.ssh
