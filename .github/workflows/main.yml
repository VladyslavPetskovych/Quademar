name: Deploy Quademar

# Server flow after push: git pull → `cd site && npm ci && npm run build` → Docker nginx reloads
# static files from ./site/dist (bind mount). Same as your manual deploy.

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_site:
    name: "site/: npm ci && npm run build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: npm run build (same as on VPS)
        run: |
          set -euo pipefail
          cd site
          npm ci
          npm run build

  deploy:
    name: Deploy to server
    needs: build_site
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: "On server: git pull → site npm run build → Docker up"
        env:
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          TARGET="${SSH_DEPLOY_PATH:-/root/var/www/Quademar}"

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            bash -s -- "$TARGET" << 'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$1"
          echo "=== Deploy path ==="
          pwd

          echo "=== 1) Git sync ==="
          # `npm run build` regenerates sitemap.xml; discard local edits so pull is not blocked
          git restore --staged --worktree site/public/sitemap.xml 2>/dev/null || true
          git checkout HEAD -- site/public/sitemap.xml 2>/dev/null || true
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          echo "=== 2) site/: npm ci && npm run build (writes ./site/dist for nginx volume) ==="
          cd site
          npm ci
          npm run build
          cd ..

          echo "=== 3) Docker (nginx + bind mount ./site/dist) ==="
          if docker compose version >/dev/null 2>&1; then
            DC=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            DC=(docker-compose)
          else
            echo "ERROR: Install Docker Compose v2 or v1." >&2
            exit 1
          fi
          "${DC[@]}" version
          DOCKER_BUILDKIT=1 "${DC[@]}" --progress=plain build --pull
          "${DC[@]}" up -d --remove-orphans --force-recreate

          echo "=== Done ==="
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        run: rm -rf ~/.ssh
