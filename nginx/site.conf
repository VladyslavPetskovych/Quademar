server {
    listen 80;
    server_name www.guardamarhotelspa.com;
    return 301 https://guardamarhotelspa.com$request_uri;
}

server {
    listen 80;
    server_name guardamarhotelspa.com;

    root /var/www/Quademar/site/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/html text/plain text/xml text/css application/javascript application/json application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}