# Canonical host (matches `SITE_ORIGIN_DEFAULT` in `site/src/config/site.js`). www → apex over HTTPS.
server {
    listen 80;
    server_name www.guardamarhotelspa.com;
    return 301 https://guardamarhotelspa.com$request_uri;
}

server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 guardamarhotelspa.com _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/html text/plain text/xml text/css application/javascript application/json application/xml application/manifest+json image/svg+xml;

    # Liveness for Docker / orchestrators (no access log noise).
    location = /health {
        default_type text/plain;
        return 200 "ok\n";
        access_log off;
    }

    # Vite emits hashed filenames under /assets — safe to cache long-term.
    # `^~` keeps the regex block below from overriding this prefix match.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Root-level brand/OG/PWA assets are not content-hashed, so don't cache them:
    # `no-cache` lets the browser reuse bytes only after revalidating (cheap 304 when
    # unchanged), so a replaced logo/photo/og-image shows up immediately.
    location ~* \.(png|ico|svg|webp|jpg|mp4|webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        access_log off;
    }

    # HTML / SPA entry — never cache, so every visit loads the latest site and the
    # newest hashed asset references. (The daily menu is fetched live on top of this.)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
