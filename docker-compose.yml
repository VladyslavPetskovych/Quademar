services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: quademar-site:latest
    # Always the freshly built tree from the repo (same as manual `cd site && npm run build`).
    volumes:
      - ./site/dist:/usr/share/nginx/html:ro
    # Default avoids binding host :80 (often used by another reverse proxy).
    ports:
      - "${WEB_PUBLISH:-127.0.0.1:8085:80}"
    restart: unless-stopped
